<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #ffffff; }
        
        /* De 'uitsnede' van je kaart */
        .crop-container {
            width: 450px;  /* Pas dit aan naar de breedte van je foto */
            height: 600px; /* Pas dit aan naar de hoogte van je foto */
            overflow: hidden;
            position: relative;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* De Heyzine player die we groter maken en verschuiven */
        iframe {
            width: 1500px; /* Veel breder maken om de witte zijbalken weg te duwen */
            height: 800px; /* Hoger maken om het logo onderaan weg te duwen */
            position: absolute;
            top: -100px;   /* Verschuiven naar boven */
            left: -525px;  /* Verschuiven naar links (midden van de kaart zoeken) */
            border: none;
        }
    </style>
</head>
<body>

<div class="crop-container">
    <iframe src="https://heyzine.com" scrolling="no"></iframe>
</div>

</body>
</html>

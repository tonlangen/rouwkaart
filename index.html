<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn 3D Kaart - Gecropt</title>
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #f0f2f5; 
            font-family: sans-serif;
        }

        /* Dit is het zichtbare venster */
        .kaart-container { 
            width: 95%; 
            max-width: 900px; 
            height: 600px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background: white;
            border-radius: 8px;
            overflow: hidden; /* Cruciaal: dit snijdt alles buiten de box weg */
            position: relative;
        }

        /* De iframe maken we groter dan de container om de randen te verbergen */
        .fp-iframe {
            position: absolute;
            border: none;
            
            /* We maken de iframe 110% breed en hoog */
            width: 220%; 
            height: 100%;

            transform: scale(0.70) translate(-15%, -15%)
            
            /* We schuiven hem iets naar links en omhoog om de controls/logo's te verbergen */
            top: -0%; 
            left: -60%;
        }
    </style>
</head>
<body>

    <div class="kaart-container">
        <iframe 
            allowfullscreen="allowfullscreen" 
            allow="clipboard-write" 
            scrolling="no" 
            class="fp-iframe" 
            src="https://heyzine.com/flip-book/7e13bf21bb.html">
        </iframe>
    </div>

</body>
</html>
